name: Update nightly release

on: 
  workflow_dispatch:
    inputs:
      revision:
        required: true

jobs:
  nightly-release:
    runs-on: ubuntu-latest
    steps:          
      - name: Update nightly release
        uses: andelf/nightly-release@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "${{github.head_ref}}-nightly"
          name: "Frank!Framework nightly release ${{github.event.inputs.revision}}"
          draft: false
          prerelease: true
          body: |
            Misschien wat linkjes hier naar nexus/docker?
